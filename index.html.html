<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Clausmeyer Meeting 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:-apple-system,'Segoe UI',system-ui,sans-serif;background:#F0F3F7;color:#1A1A2E;min-height:100vh}

/* ── HEADER ─────────────────────────────────────────────── */
.hdr{background:#00458E;padding:14px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,69,142,0.25)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:10px}
.logo-block{display:flex;flex-direction:column;gap:4px}
.logo-block img{height:26px;display:block;object-fit:contain}
.logo-sub{font-size:9.5px;color:rgba(255,255,255,0.65);letter-spacing:1.8px;text-transform:uppercase;font-weight:500}
.clock-wrap{text-align:right;flex-shrink:0}
.clock{font-size:30px;font-weight:700;letter-spacing:2px;font-variant-numeric:tabular-nums;line-height:1;color:#fff}
.clock-date{font-size:10px;color:rgba(255,255,255,0.55);margin-top:2px}
.time-status{display:flex;align-items:center;gap:4px;justify-content:flex-end;margin-top:3px}
.time-status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.time-status-dot.verified{background:#7AFFBA;animation:blink 2s ease-in-out infinite}
.time-status-dot.checking{background:#FFD700;animation:blink 0.8s ease-in-out infinite}
.time-status-dot.offline{background:#FF6B6B}
.time-status-label{font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:.2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.35}}

/* Day tabs */
.day-tabs{display:flex;margin:0 -16px;border-top:1px solid rgba(255,255,255,0.12)}
.day-tab{flex:1;padding:11px 4px;text-align:center;font-size:12.5px;font-weight:500;color:rgba(255,255,255,0.55);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all 0.15s}
.day-tab:hover{color:rgba(255,255,255,0.9);background:rgba(255,255,255,0.07)}
.day-tab.active{color:#fff;border-bottom-color:#007946;background:rgba(255,255,255,0.06)}
.day-tab .today-dot{width:6px;height:6px;border-radius:50%;background:#7AFFBA;display:inline-block;margin-left:5px;vertical-align:middle;opacity:0}
.day-tab.today .today-dot{opacity:1}

/* ── OFFLINE BANNER ──────────────────────────────────────── */
.secure-banner{display:none;background:#FFF3F3;border-bottom:2px solid #E74C3C;padding:8px 16px;text-align:center;font-size:12px;color:#C0392B;font-weight:600}
.secure-banner.show{display:block}

/* ── ALERT BANNER ────────────────────────────────────────── */
.alert{display:none;background:#007946;padding:14px 16px}
.alert.show{display:block}
.alert-inner{display:flex;align-items:center;gap:12px}
.alert-pulse{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;animation:alertpulse 1.6s ease-in-out infinite}
@keyframes alertpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.07)}}
.alert-pulse svg{width:22px;height:22px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round}
.alert-body{flex:1;min-width:0}
.alert-label{font-size:10px;font-weight:700;color:rgba(255,255,255,0.7);text-transform:uppercase;letter-spacing:1px}
.alert-title{font-size:15px;font-weight:700;color:#fff;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.alert-ref{font-size:12px;color:rgba(255,255,255,0.7);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.alert-timer{background:rgba(0,0,0,0.15);border-radius:12px;padding:6px 12px;white-space:nowrap;text-align:center;flex-shrink:0}
.alert-timer-val{font-size:22px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;line-height:1}
.alert-timer-unit{font-size:9px;color:rgba(255,255,255,0.75);display:block;text-align:center}

/* ── MAIN ────────────────────────────────────────────────── */
main{padding:16px;max-width:520px;margin:0 auto;padding-bottom:48px}
.day-panel{display:none}
.day-panel.active{display:block}

/* Section label */
.sec-label{font-size:10.5px;font-weight:700;letter-spacing:1.5px;color:#007946;text-transform:uppercase;margin:20px 0 8px 2px;display:flex;align-items:center;gap:8px}
.sec-label:first-child{margin-top:0}
.sec-label::after{content:'';flex:1;height:1.5px;background:rgba(0,121,70,0.2);border-radius:2px}

/* ── CARDS ───────────────────────────────────────────────── */
.item-card{border-radius:12px;margin-bottom:6px;overflow:hidden}

/* CURRENT — green card */
.item-current{background:#007946;box-shadow:0 4px 20px rgba(0,121,70,0.3)}
.item-current .card-inner{padding:16px}
.item-current .card-time{font-size:11px;font-weight:700;color:rgba(255,255,255,0.75);letter-spacing:.5px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.live-dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:blink 1.2s ease-in-out infinite;display:inline-block;flex-shrink:0}
.item-current .card-label{font-size:20px;font-weight:700;color:#fff;margin:6px 0 4px;line-height:1.25}
.item-current .card-ref{font-size:13px;color:rgba(255,255,255,0.75)}
.item-current .now-badge{display:inline-block;background:rgba(255,255,255,0.2);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:700;color:#fff;margin-top:10px;border:1px solid rgba(255,255,255,0.3)}

/* UPCOMING — blue tinted white card */
.item-upcoming{background:#fff;border:2px solid #00458E;box-shadow:0 2px 12px rgba(0,69,142,0.12)}
.item-upcoming .card-inner{padding:14px}
.item-upcoming .card-time{font-size:11.5px;font-weight:700;color:#00458E;letter-spacing:.3px}
.item-upcoming .card-label{font-size:17px;font-weight:600;color:#00458E;margin:5px 0 3px}
.item-upcoming .card-ref{font-size:12px;color:#464656}
.item-upcoming .countdown{font-size:11.5px;font-weight:700;color:#007946;margin-top:8px;display:flex;align-items:center;gap:6px}
.item-upcoming .countdown::before{content:'';width:7px;height:7px;border-radius:50%;background:#007946;animation:blink 1.2s ease-in-out infinite;display:inline-block;flex-shrink:0}

/* DONE — very light */
.item-done{background:#fff;border:0.5px solid #DDE4EE}
.item-done .card-inner{padding:11px 14px;display:flex;align-items:center;gap:10px}
.item-done .card-time{font-size:11px;color:#B0B8C8;min-width:82px;font-variant-numeric:tabular-nums;text-decoration:line-through}
.item-done .card-label{font-size:13px;color:#B0B8C8;flex:1}
.item-done .done-check{width:18px;height:18px;border-radius:50%;background:#E6F4EE;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.item-done .done-check svg{width:10px;height:10px;stroke:#007946;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* BREAK done */
.item-break-done{background:#F8FAFB;border:0.5px solid #E8ECF2}
.item-break-done .card-inner{padding:8px 14px;display:flex;align-items:center;gap:10px}
.item-break-done .card-time{font-size:11px;color:#C5CDD8;min-width:82px}
.item-break-done .card-label{font-size:12px;color:#C5CDD8;font-style:italic}

/* BREAK visible */
.item-break-visible{background:#F8FAFB;border:0.5px solid #DDE4EE}
.item-break-visible .card-inner{padding:9px 14px;display:flex;align-items:center;gap:10px}
.item-break-visible .card-time{font-size:12px;color:#8A96A8;min-width:82px}
.item-break-visible .card-label{font-size:13px;color:#8A96A8;font-style:italic;flex:1}

/* LOCKED — placeholder */
.item-locked{background:#fff;border:1.5px dashed #D0D8E8}
.item-locked .card-inner{padding:13px 14px;display:flex;align-items:center;gap:12px}
.item-locked .lock-time{font-size:12px;font-weight:600;color:#C0CADA;min-width:55px;font-variant-numeric:tabular-nums}
.item-locked .lock-bar{flex:1;height:10px;background:#EEF2F8;border-radius:5px}
.item-locked .lock-bar-inner{height:100%;width:45%;background:#E0E6F0;border-radius:5px}
.item-locked .lock-icon{width:28px;height:28px;border-radius:50%;background:#EEF2F8;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.item-locked .lock-icon svg{width:14px;height:14px;stroke:#B0BDD0;fill:none;stroke-width:2;stroke-linecap:round}
.item-locked .lock-reveal{font-size:10px;color:#B0BDD0;white-space:nowrap}

/* BREAK locked */
.item-break-locked{background:#FAFBFC;border:1px dashed #E4EAF2}
.item-break-locked .card-inner{padding:8px 14px;display:flex;align-items:center;gap:10px}
.item-break-locked .lock-time{font-size:11px;color:#D0D8E4;min-width:55px}
.item-break-locked .lock-bar{flex:1;height:6px;background:#EEF2F8;border-radius:3px}

/* Day progress */
.day-progress{margin:0 0 14px;height:4px;background:#DDE4EE;border-radius:2px;overflow:hidden}
.day-progress-fill{height:100%;background:linear-gradient(90deg,#00458E,#007946);border-radius:2px;transition:width 1s ease}

/* Status pill */
.status-pill{text-align:center;margin-top:16px;padding:10px 14px;background:#fff;border-radius:10px;border:0.5px solid #DDE4EE}
.status-pill p{font-size:12px;color:#8A96A8}
.status-pill strong{color:#007946}

/* ── FOOTER ──────────────────────────────────────────────── */
.site-footer{background:#007946;padding:14px 16px;margin-top:8px;text-align:center}
.site-footer p{color:rgba(255,255,255,0.7);font-size:11px}
.site-footer strong{color:#fff}

/* Responsive */
@media(min-width:480px){
  .clock{font-size:36px}
  .item-current .card-label{font-size:22px}
}
</style>
</head>

function toMin(t){
  if(!t) return 0;
  const[h,m]=t.split(":").map(Number);
  return h*60+m;
}

// ── SECURE SERVER TIME ─────────────────────────────────────
let serverOffsetMs = null;   // diff between server UTC and device UTC
let lastServerSync = 0;
let syncOK = false;
const SYNC_INTERVAL = 5 * 60 * 1000;  // re-sync every 5 minutes
const TIME_APIS = [
  'https://worldtimeapi.org/api/timezone/Europe/Berlin',
  'https://timeapi.io/api/Time/current/zone?timeZone=Europe/Berlin',
];

async function syncServerTime() {
  setStatus('checking');
  for (const url of TIME_APIS) {
    try {
      const res  = await fetch(url, {cache:'no-store'});
      if (!res.ok) continue;
      const data = await res.json();
      const fetchedAt = Date.now();
      // worldtimeapi uses "datetime", timeapi uses "dateTime"
      const dtStr = data.datetime || data.dateTime;
      if (!dtStr) continue;
      const serverMs = new Date(dtStr).getTime();
      serverOffsetMs = serverMs - fetchedAt;
      lastServerSync = fetchedAt;
      syncOK = true;
      setStatus('verified');
      document.getElementById('offline-banner').classList.remove('show');
      return;
    } catch(e) {}
  }
  // All APIs failed
  syncOK = false;
  setStatus('offline');
  document.getElementById('offline-banner').classList.add('show');
}

function setStatus(state) {
  const dot   = document.getElementById('ts-dot');
  const label = document.getElementById('ts-label');
  if (!dot) return;
  dot.className   = 'time-status-dot ' + state;
  label.textContent = state === 'verified' ? 'Zeit verifiziert'
                    : state === 'checking'  ? 'Verbinde...'
                    :                         'Offline!';
}

function getSecureNow() {
  // Re-sync if needed
  const now = Date.now();
  if (now - lastServerSync > SYNC_INTERVAL) syncServerTime();
  // Use server-corrected time if available, else fall back to device
  if (serverOffsetMs !== null) {
    return new Date(now + serverOffsetMs);
  }
  return new Date();
}

function nowMin() {
  const n = getSecureNow();
  return n.getHours() * 60 + n.getMinutes();
}

function todayDateStr() {
  const n = getSecureNow();
  return n.toISOString().slice(0,10);
}


function getState(item, dayIdx){
  const todayDate = getSecureNow().toISOString().slice(0,10);
  const itemDate  = DAYS_META[dayIdx].date;
  const startM = toMin(item.start);
  let   endM   = toMin(item.end);
  if(endM <= startM) endM += 24*60;
  const now = nowMin();

  if(itemDate < todayDate) return "done";
  if(itemDate > todayDate) {
    const minsUntil = (startM - now) + (itemDate > todayDate ? 24*60 : 0);
    return "locked";
  }
  // Same day
  if(now >= startM && now < endM) return "current";
  if(now >= endM)                 return "done";
  const diff = startM - now;
  if(diff <= 15) return "upcoming";
  return "locked";
}

function formatTimeRange(start, end){
  if(end === start) return start;
  return start + " – " + end;
}

function minutesUntil(start){
  return toMin(start) - nowMin();
}

function buildCard(item, dayIdx){
  const state  = getState(item, dayIdx);
  const brk    = isBreak(item.label);
  const timeStr = formatTimeRange(item.start, item.end);
  const diff    = minutesUntil(item.start);
  const div = document.createElement("div");

  if(state === "current"){
    div.className = "item-card item-current";
    div.dataset.current = "1";
    div.innerHTML = `<div class="card-inner">
      <div class="card-time"><span class="live-dot"></span> Läuft gerade · ${timeStr} Uhr</div>
      <div class="card-label">${item.label}</div>
      ${item.ref?`<div class="card-ref">${item.ref}</div>`:''}
      <div class="card-badge">● Jetzt aktiv</div>
    </div>`;
  }
  else if(state === "upcoming"){
    div.className = "item-card item-upcoming";
    div.dataset.upcoming = "1";
    const mins = Math.max(1, diff);
    div.innerHTML = `<div class="card-inner">
      <div class="card-time">${timeStr} Uhr</div>
      <div class="card-label">${item.label}</div>
      ${item.ref?`<div class="card-ref">${item.ref}</div>`:''}
      <div class="countdown">Beginnt in ${mins} Minute${mins===1?'':'n'}</div>
    </div>`;
  }
  else if(state === "done"){
    if(brk){
      div.className = "item-card item-break-done";
      div.innerHTML = `<div class="card-inner">
        <span class="card-time">${item.start}</span>
        <span class="card-label">${item.label}</span>
      </div>`;
    } else {
      div.className = "item-card item-done";
      div.innerHTML = `<div class="card-inner">
        <span class="card-time">${timeStr}</span>
        <span class="card-label">${item.label}</span>
        <span class="done-check"><svg viewBox="0 0 12 12"><polyline points="2,6 5,9 10,3"/></svg></span>
      </div>`;
    }
  }
  else { // locked
    if(brk){
      div.className = "item-card item-break-locked";
      div.innerHTML = `<div class="card-inner">
        <span class="lock-time">${item.start}</span>
        <div class="lock-bar"></div>
      </div>`;
    } else {
      const revealAt = diff <= 60 ? `sichtbar um ${toMin(item.start)-15} → ${item.start.split(':')[0]}:${String((toMin(item.start)-15)%60).padStart(2,'0')} Uhr` : '';
      div.className = "item-card item-locked";
      // calc reveal time string
      const revMin = toMin(item.start) - 15;
      const revH = Math.floor(revMin/60);
      const revM = String(revMin%60).padStart(2,'0');
      div.innerHTML = `<div class="card-inner">
        <span class="lock-time">${item.start}</span>
        <div class="lock-bar"></div>
        <div class="lock-icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
        <span class="lock-reveal">ab ${revH}:${revM}</span>
      </div>`;
    }
  }
  return div;
}

function renderDay(dayIdx){
  const panel = document.getElementById(`day-${dayIdx}`);
  panel.innerHTML = "";

  // Group by section
  const sections = {};
  AGENDA.filter(a=>a.day===dayIdx).forEach(item=>{
    if(!sections[item.sec]) sections[item.sec] = [];
    sections[item.sec].push(item);
  });

  // Day progress bar (only for today)
  const todayDate = getSecureNow().toISOString().slice(0,10);
  if(DAYS_META[dayIdx].date === todayDate){
    const dayItems = AGENDA.filter(a=>a.day===dayIdx);
    const firstStart = toMin(dayItems[0].start);
    const lastEnd    = toMin(dayItems[dayItems.length-1].end);
    const total = lastEnd - firstStart;
    const elapsed = Math.max(0, Math.min(total, nowMin() - firstStart));
    const pct = total > 0 ? Math.round(elapsed/total*100) : 0;
    const pb = document.createElement("div");
    pb.className = "day-progress";
    pb.innerHTML = `<div class="day-progress-fill" style="width:${pct}%"></div>`;
    panel.appendChild(pb);
  }

  Object.entries(sections).forEach(([sec, items])=>{
    const secEl = document.createElement("div");
    secEl.className = "sec-label";
    secEl.textContent = sec;
    panel.appendChild(secEl);
    items.forEach(item=>{
      panel.appendChild(buildCard(item, dayIdx));
    });
  });

  // Status summary
  const locked  = AGENDA.filter(a=>a.day===dayIdx && getState(a,dayIdx)==="locked" && !isBreak(a.label)).length;
  const visible = AGENDA.filter(a=>a.day===dayIdx && getState(a,dayIdx)!=="locked").length;
  const sum = document.createElement("div");
  sum.className = "status-pill";
  if(locked > 0){
    sum.innerHTML = `<p>${locked} Punkt${locked===1?'':'e'} noch <strong>gesperrt</strong> · werden 15 Min. vorher sichtbar</p>`;
  } else {
    sum.innerHTML = `<p>Alle ${visible} Punkte des Tages sind <strong>sichtbar</strong></p>`;
  }
  panel.appendChild(sum);
}

function updateAlert(dayIdx){
  const todayDate = getSecureNow().toISOString().slice(0,10);
  if(DAYS_META[dayIdx].date !== todayDate){ document.getElementById("alert").classList.remove("show"); return; }

  const upcoming = AGENDA.find(a=> a.day===dayIdx && getState(a,dayIdx)==="upcoming" && !isBreak(a.label));
  const alert = document.getElementById("alert");
  if(upcoming){
    const mins = Math.max(1, minutesUntil(upcoming.start));
    document.getElementById("alert-title").textContent = upcoming.label;
    document.getElementById("alert-ref").textContent   = upcoming.ref || "";
    document.getElementById("alert-min").textContent   = mins;
    alert.classList.add("show");
  } else {
    alert.classList.remove("show");
  }
}

// Clock
function tick(){
  const n = getSecureNow();
  const h = String(n.getHours()).padStart(2,"0");
  const m = String(n.getMinutes()).padStart(2,"0");
  document.getElementById("clock").textContent = h+":"+m;
  const days=["So","Mo","Di","Mi","Do","Fr","Sa"];
  const months=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  document.getElementById("clock-date").textContent = days[n.getDay()]+". "+n.getDate()+". "+months[n.getMonth()];
}

let currentDay = 0;

function switchDay(idx){
  currentDay = idx;
  document.querySelectorAll(".day-panel").forEach((p,i)=>p.classList.toggle("active",i===idx));
  document.querySelectorAll(".day-tab").forEach((t,i)=>t.classList.toggle("active",i===idx));
  updateAlert(idx);
  scrollToCurrent();
}

function scrollToCurrent(){
  setTimeout(()=>{
    const cur = document.querySelector(`#day-${currentDay} [data-current]`);
    if(cur) cur.scrollIntoView({behavior:"smooth",block:"center"});
    else {
      const up = document.querySelector(`#day-${currentDay} [data-upcoming]`);
      if(up) up.scrollIntoView({behavior:"smooth",block:"center"});
    }
  },200);
}

function autoSelectDay(){
  const todayDate = getSecureNow().toISOString().slice(0,10);
  DAYS_META.forEach((d,i)=>{
    if(d.date===todayDate) document.querySelector(`.day-tab[data-day="${i}"]`).classList.add("today");
  });
  const todayIdx = DAYS_META.findIndex(d=>d.date===todayDate);
  switchDay(todayIdx >= 0 ? todayIdx : 0);
}

function refresh(){
  [0,1,2,3].forEach(i=>renderDay(i));
  updateAlert(currentDay);
}

// Init
syncServerTime();
tick();
[0,1,2,3].forEach(i=>renderDay(i));
autoSelectDay();
setInterval(tick, 1000);
setInterval(refresh, 30000);
</script>
